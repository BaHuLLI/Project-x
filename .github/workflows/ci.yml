name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore .\Dashbord.sln
      - name: Build
        run: dotnet build .\Dashbord.sln -c Release --no-restore

  lint:
    name: lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore .\Dashbord.sln
      - name: Analyzer check
        run: dotnet format .\Dashbord.sln analyzers --verify-no-changes --no-restore

  format-check:
    name: format-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore .\Dashbord.sln
      - name: Whitespace check
        run: dotnet format .\Dashbord.sln whitespace --verify-no-changes --no-restore
      - name: Style check
        run: dotnet format .\Dashbord.sln style --verify-no-changes --no-restore

  type-check:
    name: type-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore .\Dashbord.sln
      - name: Type check
        run: dotnet build .\Dashbord.sln -c Release --no-restore -p:TreatWarningsAsErrors=true

  unit-tests:
    name: unit-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore .\Dashbord.sln
      - name: Build
        run: dotnet build .\Dashbord.sln -c Release --no-restore
      - name: Run unit tests
        run: dotnet test .\tests\ProjectXProDash.UnitTests\ProjectXProDash.UnitTests.csproj -c Release --no-build --logger "trx;LogFileName=unit-tests.trx"

  smoke-tests:
    name: smoke-tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore .\Dashbord.sln
      - name: Build
        run: dotnet build .\Dashbord.sln -c Release --no-restore
      - name: Run smoke tests
        run: dotnet test .\tests\ProjectXProDash.SmokeTests\ProjectXProDash.SmokeTests.csproj -c Release --no-build --logger "trx;LogFileName=smoke-tests.trx"
